version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: hotel-catering-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hotel_catering}
      MYSQL_USER: ${MYSQL_USER:-hotel_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_user}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-change_me_root}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: hotel-catering-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-catering-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-hotel_catering}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${MYSQL_USER:-hotel_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change_me_user}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      JWT_SECRET: ${JWT_SECRET:-hotel-catering-jwt-secret-2026-secure-key}
    ports:
      - "8080:8080"

volumes:
  mysql_data:
  redis_data:
